name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master", "develop"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Biome Lint
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cache Bun installation
        uses: actions/cache@v4
        id: bun-cache
        with:
          path: ~/.bun
          key: ${{ runner.os }}-bun-1.2.21
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.21"

      - name: Install dependencies
        run: bun install --no-audit --no-fund

      - name: Run Biome check
        run: bun run biome:check

  typecheck:
    name: Astro Typecheck
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      
      - name: Cache Bun installation
        uses: actions/cache@v4
        id: bun-cache
        with:
          path: ~/.bun
          key: ${{ runner.os }}-bun-1.2.21
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.21"

      - name: Install dependencies
        run: bun install --no-audit --no-fund

      - name: Run Astro typecheck
        run: bun run typecheck

  test:
    name: Unit and Integration Tests
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      
      - name: Cache Bun installation
        uses: actions/cache@v4
        id: bun-cache
        with:
          path: ~/.bun
          key: ${{ runner.os }}-bun-1.2.21
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.21"

      - name: Install dependencies
        run: bun install --no-audit --no-fund

      - name: Run Vitest
        run: bun run test